<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-ray Classifier - AI Medical Imaging</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }
        
        .upload-area.dragover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .upload-subtext {
            color: #999;
            font-size: 13px;
        }
        
        #fileInput {
            display: none;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-upload:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-container {
            display: none;
            background: #f8f9ff;
            border-radius: 10px;
            padding: 25px;
            margin-top: 20px;
        }
        
        .result-container.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-label {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .result-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .result-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .badge-normal {
            background: #d4edda;
            color: #155724;
        }
        
        .badge-abnormal {
            background: #f8d7da;
            color: #721c24;
        }
        
        .confidence {
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            font-size: 14px;
        }
        
        .error-message.show {
            display: block;
        }
        
        .file-name {
            color: #666;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 X-ray Classifier</h1>
            <p class="subtitle">AI-powered medical image analysis - Normal vs Abnormal</p>
        </header>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click or drag image here</div>
            <div class="upload-subtext">Supported: PNG, JPG, JPEG, GIF (Max 16MB)</div>
            <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.gif">
        </div>
        
        <div class="button-group">
            <button class="btn-upload" id="uploadBtn">Choose Image</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Analyzing image...</div>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="result-container" id="resultContainer">
            <div class="result-label">Prediction Result</div>
            <div class="result-value">
                <span class="result-badge" id="resultBadge"></span>
            </div>
            <div class="result-label">Confidence Score</div>
            <div class="confidence" id="confidenceScore"></div>
            <div class="file-name" id="fileName"></div>
        </div>
    </div>
    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const loading = document.getElementById('loading');
        const resultContainer = document.getElementById('resultContainer');
        const errorMessage = document.getElementById('errorMessage');
        
        // Click to upload
        uploadBtn.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('click', () => fileInput.click());
        
        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            // Validate file
            const validTypes = ['image/png', 'image/jpeg', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                showError('Invalid file type. Please use PNG, JPG, or GIF');
                return;
            }
            
            if (file.size > 16 * 1024 * 1024) {
                showError('File too large. Maximum size is 16MB');
                return;
            }
            
            // Upload and predict
            uploadAndPredict(file);
        }
        
        function uploadAndPredict(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            loading.style.display = 'block';
            resultContainer.classList.remove('show');
            errorMessage.classList.remove('show');
            
            fetch('/predict', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loading.style.display = 'none';
                
                if (data.success) {
                    showResult(data, file.name);
                    errorMessage.classList.remove('show');
                } else {
                    showError(data.error || 'Prediction failed');
                }
            })
            .catch(error => {
                loading.style.display = 'none';
                showError('Error: ' + error.message);
            });
        }
        
        function showResult(data, fileName) {
            const badge = document.getElementById('resultBadge');
            const confidence = document.getElementById('confidenceScore');
            const fileNameEl = document.getElementById('fileName');
            
            const prediction = data.prediction;
            const confidenceValue = data.confidence;
            
            badge.textContent = prediction;
            badge.className = 'result-badge ' + (prediction === 'Normal' ? 'badge-normal' : 'badge-abnormal');
            confidence.textContent = confidenceValue;
            fileNameEl.textContent = '📄 ' + fileName;
            
            resultContainer.classList.add('show');
        }
        
        function showError(message) {
            errorMessage.textContent = '⚠️ ' + message;
            errorMessage.classList.add('show');
        }
    </script>
</body>
</html>
